# GitHub Actions — CI/CD Pipeline
# Runs on every push to main and on pull requests

name: Deploy Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify public/index.html exists
        run: test -f public/index.html && echo "✅ index.html found" || (echo "❌ index.html missing" && exit 1)

      - name: Deploy status
        run: echo "✅ Checks passed — Netlify handles the deploy automatically"
